name: CI - Train & Deploy Model

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "Number of estimators"
        required: false
        default: "200"
      max_depth:
        description: "Max depth"
        required: false
        default: "10"
      learning_rate:
        description: "Learning rate"
        required: false
        default: "0.1"

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      # ── 3. Install dependencies ───────────────────────────
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.26.4 pandas==2.2.2 scikit-learn==1.5.2 \
                      mlflow==2.19.0 dagshub==0.3.36 \
                      matplotlib==3.9.2 joblib==1.4.2

      # ── 4. Train model via MLflow Project ─────────────────
      - name: Train Model (MLflow Project)
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: rathaavle
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: https://dagshub.com/rathaavle/ml-system.mlflow
        run: |
          cd MLProject
          mlflow run . \
            -P n_estimators=${{ github.event.inputs.n_estimators || '200' }} \
            -P max_depth=${{ github.event.inputs.max_depth || '10' }} \
            -P learning_rate=${{ github.event.inputs.learning_rate || '0.1' }} \
            --env-manager=local

      # ── 6. Upload artefak ke GitHub ───────────────────────
      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ github.run_number }}
          path: |
            MLProject/saved_model/
            MLProject/mlruns/

      # ── 7. Commit model ke repo ───────────────────────────
      - name: Commit Model to Repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add MLProject/saved_model/ || true
          git diff --staged --quiet || git commit -m "ci: update trained model [run #${{ github.run_number }}] [skip ci]"
          git push || true

      # ── 8. Build & Push Docker Image ──────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image via MLflow
        run: |
          cp -r MLProject/saved_model saved_model || true
          docker build -t rathaavle/california-housing-model:latest .

      - name: Push Docker Image to Docker Hub
        run: |
          docker push rathaavle/california-housing-model:latest
          docker tag rathaavle/california-housing-model:latest \
                     rathaavle/california-housing-model:run-${{ github.run_number }}
          docker push rathaavle/california-housing-model:run-${{ github.run_number }}

      - name: Save Docker Hub Link
        run: |
          echo "https://hub.docker.com/r/rathaavle/california-housing-model" > MLProject/docker_hub_link.txt
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add MLProject/docker_hub_link.txt || true
          git diff --staged --quiet || git commit -m "ci: add docker hub link [skip ci]"
          git push || true
